name: Zentry CI (Code Quality Verification)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# Automatically cancel older running builds if a new commit is pushed to the same PR branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-code-quality:
    name: Lint, Format & Type-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Context
        uses: actions/checkout@v4

      - name: Install Node.js runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm & Warm Virtual Cache Store
        uses: pnpm/action-setup@v3
        with:
          version: ^11.0.9
          run_install: false

      - name: Locate pnpm Store
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Expose and Bind Global Dependency Cache Keys
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Synchronize Local Project Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Workspace File Formatting Codes
        run: pnpm format

      - name: Analyze Runtime Engineering Architecture (Linting)
        run: pnpm lint

      - name: Verify TypeScript Compilation Bounds
        run: pnpm build

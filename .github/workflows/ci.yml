name: Zentry CI (Code Quality Verification)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

# Automatically cancel older running builds if a new commit is pushed to the same PR branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify-code-quality:
    name: Lint, Format & Type-Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Context
        uses: actions/checkout@v4

      - name: Install Node.js runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm & Warm Virtual Cache Store
        uses: pnpm/action-setup@v4 # Upgraded to v4 for native lockfile-optimized caching features
        with:
          version: 11.0.9
          run_install: false

      # Built-in optimized caching configuration provided directly by setup-node
      - name: Expose and Bind Global Dependency Cache Keys
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Synchronize Local Project Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Workspace File Formatting Codes
        run: pnpm format

      - name: Analyze Runtime Engineering Architecture (Linting)
        run: pnpm lint

      - name: Verify TypeScript Compilation Bounds
        run: pnpm build